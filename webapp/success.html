<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Заявка создана</title>
  <link rel="stylesheet" href="css/main.css">
  <script src="https://telegram.org/js/telegram-web-app.js"></script>
</head>
<body>
  <div class="container">
    <header class="header">
      <h1>✅ Заявка создана</h1>
    </header>
    <main class="main">
      <p id="bookingId" class="booking-id"></p>
      <p id="statusText">Ожидает подтверждения диспетчером</p>
      <a id="backSearch" href="index.html" class="btn btn-primary">Новый поиск</a>
      <a id="myBookings" href="profile.html" class="btn" style="margin-top:8px; display:inline-block;">Мои заявки</a>
    </main>
  </div>
  <script>
    const params = new URLSearchParams(window.location.search);
    const id = params.get('booking_id');
    if (id) document.getElementById('bookingId').textContent = 'Номер заявки: ' + id;
    else document.getElementById('bookingId').textContent = 'Заявка создана.';
    if (window.Telegram && Telegram.WebApp) Telegram.WebApp.ready();
  </script>
</body>
</html>
