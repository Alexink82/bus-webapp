<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <meta name="theme-color" content="#1a1a2e">
  <title>Диспетчер</title>
  <link rel="stylesheet" href="css/main.css">
  <link rel="stylesheet" href="css/telegram-theme.css">
  <link rel="stylesheet" href="css/dispatcher.css">
  <script>(function(){var t=localStorage.getItem('theme');if(t==='light'||t==='dark')document.documentElement.setAttribute('data-theme',t);})();</script>
  <script src="https://telegram.org/js/telegram-web-app.js"></script>
</head>
<body>
  <div class="container">
    <header class="header">
      <div class="header__logo-bar">
        <img src="img/logo.png" alt="СТОЛИЦА" class="header__logo" width="160" height="40">
      </div>
      <div class="header__row">
        <button type="button" id="themeToggle" class="theme-toggle" aria-label="Сменить тему" title="Светлая/тёмная тема">☀️</button>
        <div class="header__title-wrap">
          <h1>Панель диспетчера</h1>
        </div>
        <a href="index.html" class="header__exit">Выйти</a>
      </div>
    </header>
    <div id="loginWarning" class="warning hidden">Войдите через Telegram (как диспетчер).</div>
    <main id="dispatcherMain" class="main hidden">
      <div class="tabs">
        <button type="button" data-tab="new">🆕 Новые</button>
        <button type="button" data-tab="active">🔄 В работе</button>
        <button type="button" data-tab="search">🔍 Поиск</button>
        <button type="button" data-tab="stats">📊 Статистика</button>
      </div>
      <div class="dispatcher-card" style="margin-bottom:12px;">
        <strong>Фильтры</strong><br>
        <div style="display:flex; gap:8px; flex-wrap:wrap; margin-top:8px;">
          <input type="text" id="filterRoute" placeholder="ID маршрута" style="max-width:140px;">
          <input type="date" id="filterDate" style="max-width:180px;">
          <select id="filterPayment" style="max-width:180px;">
            <option value="">Оплата: все</option>
            <option value="paid">Оплачено</option>
            <option value="pending">Не оплачено</option>
          </select>
          <button type="button" id="applyFiltersBtn">Применить</button>
        </div>
      </div>
      <div id="tabNew" class="tab-panel">
        <div id="overdueBlock" class="dispatcher-overdue hidden">
          <h3 class="dispatcher-overdue__title">⚠️ Просроченные &gt; 15 мин</h3>
          <p class="dispatcher-overdue__count" id="overdueCount"></p>
          <div id="overdueList"></div>
        </div>
        <h3 class="dispatcher-new__title" id="newSectionTitle">Новые</h3>
        <div id="newList"></div>
      </div>
      <div id="tabActive" class="tab-panel hidden">
        <div id="activeList"></div>
      </div>
      <div id="tabSearch" class="tab-panel hidden">
        <input type="text" id="searchInput" placeholder="Номер заявки или фамилия">
        <button type="button" id="searchBtn">Искать</button>
        <div id="searchResults"></div>
      </div>
      <div id="tabStats" class="tab-panel hidden">
        <div id="statsContent"></div>
      </div>
    </main>
  </div>
  <script src="js/api.js?v=2"></script>
  <script src="js/auth.js?v=2"></script>
  <script src="js/theme.js?v=2"></script>
  <script src="js/dispatcher.js?v=2"></script>
</body>
</html>
