<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <meta name="theme-color" content="#1a1a2e">
  <title>Диспетчер</title>
  <script>(function(){var t=localStorage.getItem('theme');if(t==='light'||t==='dark')document.documentElement.setAttribute('data-theme',t);else if(window.matchMedia&&window.matchMedia('(min-width: 1024px)').matches)document.documentElement.setAttribute('data-theme','dark');})();</script>
  <script src="https://telegram.org/js/telegram-web-app.js"></script>
  <script type="module" src="./js/dispatcher-entry.js"></script>
  <link rel="stylesheet" href="css/main.css">
  <link rel="stylesheet" href="css/telegram-theme.css">
  <link rel="stylesheet" href="css/dispatcher.css">
</head>
<body class="page-dispatcher">
  <div class="container">
    <header class="header">
      <div class="header__logo-bar">
        <img src="/assets/logo-DHd3bDT6.png" alt="СТОЛИЦА" class="header__logo" width="160" height="40">
      </div>
      <div id="roleShellPlaceholder"></div>
      <div class="header__row">
        <button type="button" id="themeToggle" class="theme-toggle" aria-label="Сменить тему" title="Светлая/тёмная тема">☀️</button>
        <div class="header__title-wrap">
          <h1>Панель диспетчера</h1>
        </div>
        <a href="index.html" class="header__exit">Выйти</a>
      </div>
    </header>
    <div id="loginWarning" class="warning hidden">Войдите через Telegram (как диспетчер).</div>

    <div id="dispatcherWrap" class="dispatcher-wrap hidden">
      <!-- Топ-бар: поиск + счётчик SLA (всегда виден) -->
      <div class="dispatcher-topbar">
        <input type="text" id="dispatcherSearch" class="dispatcher-topbar__search" placeholder="Номер заявки или фамилия" aria-label="Поиск">
        <span class="dispatcher-topbar__sla" id="dispatcherSlaCount" aria-label="Просрочено заявок">—</span>
      </div>

      <div class="dispatcher-container">
        <!-- Левая колонка: фильтры + статистика смены -->
        <aside class="dispatcher-sidebar dispatcher-sidebar--left">
          <div class="dispatcher-card">
            <strong>Фильтры</strong>
            <div class="dispatcher-filters">
              <input type="text" id="filterRoute" placeholder="ID маршрута" class="dispatcher-filters__input">
              <input type="date" id="filterDate" class="dispatcher-filters__input">
              <select id="filterPayment" class="dispatcher-filters__select">
                <option value="">Оплата: все</option>
                <option value="paid">Оплачено</option>
                <option value="pending">Не оплачено</option>
              </select>
              <button type="button" id="applyFiltersBtn" class="btn btn-primary btn-small">Применить</button>
            </div>
          </div>
          <div class="dispatcher-card dispatcher-stats-card">
            <strong>Статистика смены</strong>
            <div id="sidebarStatsContent" class="dispatcher-stats-content">—</div>
          </div>
          <div class="dispatcher-card dispatcher-export-card">
            <strong>Экспорт за смену</strong>
            <p class="dispatcher-export-card__hint">CSV всех заявок за сегодня по вашим маршрутам.</p>
            <button type="button" id="dispatcherExportBtn" class="btn btn-outline btn-small">Скачать CSV</button>
          </div>
        </aside>

        <!-- Центр: табы + overdue + карточки -->
        <main class="dispatcher-main">
          <div class="dispatcher-tabs" role="tablist">
            <button type="button" class="dispatcher-tabs__btn active" data-tab="new" role="tab" aria-selected="true">🆕 Новые</button>
            <button type="button" class="dispatcher-tabs__btn" data-tab="active" role="tab" aria-selected="false">🔄 В работе</button>
          </div>
          <div id="tabNew" class="dispatcher-tab-panel">
            <div id="overdueBlock" class="dispatcher-overdue hidden">
              <h3 class="dispatcher-overdue__title">⚠️ Просроченные &gt; 15 мин</h3>
              <p class="dispatcher-overdue__count" id="overdueCount"></p>
              <div id="overdueList" class="dispatcher-cards-grid"></div>
            </div>
            <h3 class="dispatcher-section-title" id="newSectionTitle">Новые</h3>
            <div class="dispatcher-bulk-actions" id="newBulkActions">
              <label class="dispatcher-bulk-actions__check"><input type="checkbox" id="selectAllNew" aria-label="Выбрать все"> Выбрать все</label>
              <button type="button" id="takeSelectedBtn" class="btn btn-primary btn-small">Взять все выбранные (<span id="takeSelectedCount">0</span>)</button>
            </div>
            <div id="newList" class="dispatcher-cards-grid"></div>
          </div>
          <div id="tabActive" class="dispatcher-tab-panel hidden">
            <div id="activeList" class="dispatcher-cards-grid"></div>
          </div>
        </main>

        <!-- Правая колонка: моя активная заявка -->
        <aside class="dispatcher-sidebar dispatcher-sidebar--right">
          <div class="dispatcher-active-widget" id="activeWidget">
            <h3 class="dispatcher-active-widget__title">Моя активная заявка</h3>
            <div id="activeWidgetContent" class="dispatcher-active-widget__content">
              <p class="dispatcher-active-widget__empty" id="activeWidgetEmpty">Нет активной заявки. Возьмите заявку из списка.</p>
              <div id="activeWidgetCard" class="dispatcher-active-widget__card hidden"></div>
            </div>
          </div>
        </aside>
      </div>

      <!-- Мобильный: кнопка «Фильтры» и модалка активной заявки (показываются только на <1024px) -->
      <div class="dispatcher-mobile-actions" id="dispatcherMobileActions">
        <button type="button" id="mobileFiltersBtn" class="btn btn-outline btn-small">Фильтры</button>
        <button type="button" id="mobileActiveBtn" class="btn btn-primary btn-small">Моя активная заявка</button>
      </div>
    </div>
  </div>

  <!-- Модалка контакта пассажира -->
  <div id="contactModalRoot" class="app-modal-root" aria-hidden="true"></div>

</body>
</html>
