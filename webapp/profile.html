<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <meta name="theme-color" content="#1a1a2e">
  <title>Профиль</title>
  <link rel="stylesheet" href="css/main.css">
  <link rel="stylesheet" href="css/telegram-theme.css">
  <link rel="stylesheet" href="css/date-picker.css">
  <script>(function(){var t=localStorage.getItem('theme');if(t==='light'||t==='dark')document.documentElement.setAttribute('data-theme',t);})();</script>
  <script src="https://telegram.org/js/telegram-web-app.js"></script>
</head>
<body>
  <div id="maintenanceOverlay" class="maintenance-overlay hidden">
    <div class="maintenance-overlay__inner">
      <img src="img/logo.png" alt="СТОЛИЦА" class="maintenance-overlay__logo" width="160" height="40">
      <h1>Технические работы</h1>
      <p>Приносим извинения за неудобства. Мы обновляем сервис.</p>
      <p>Примерное время возобновления: <span id="maintenanceUntil">—</span></p>
      <p class="maintenance-overlay__countdown" id="maintenanceCountdown">—</p>
    </div>
  </div>
  <div class="container" id="appContent">
    <header class="header">
      <div class="header__logo-bar">
        <img src="img/logo.png" alt="СТОЛИЦА" class="header__logo" width="160" height="40">
      </div>
      <div class="header__row">
        <button type="button" id="themeToggle" class="theme-toggle" aria-label="Сменить тему" title="Светлая/тёмная тема">☀️</button>
        <div class="header__title-wrap">
          <h1>Профиль</h1>
        </div>
        <button type="button" id="tgCloseBtn" class="tg-close-btn" aria-label="Закрыть" title="Закрыть">✕</button>
      </div>
    </header>
    <main class="main">
      <section id="bookingsSection">
        <h2>Мои брони</h2>
        <div id="bookingsList"></div>
      </section>
      <section id="passengersSection">
        <h2>Сохранённые пассажиры</h2>
        <div id="passengersList"></div>
        <button type="button" id="addPassenger" class="btn btn-small">Добавить</button>
      </section>
    </main>
    <nav class="tab-bar" id="tabBar">
      <a href="index.html" class="tab">🎫 Бронь</a>
      <a href="profile.html" class="tab active">👤 Профиль</a>
      <a href="faq.html" class="tab">❓ FAQ</a>
    </nav>
  </div>
  <script src="js/maintenance.js"></script>
  <script src="js/api.js"></script>
  <script src="js/auth.js"></script>
  <script src="js/app-modal.js"></script>
  <script src="js/input-masks.js"></script>
  <script src="js/date-picker.js"></script>
  <script src="js/theme.js"></script>
  <script src="js/nav.js"></script>
  <script src="js/prefetch.js"></script>
  <script src="js/profile.js"></script>
  <script>
    (function() {
      var closeBtn = document.getElementById('tgCloseBtn');
      if (closeBtn) {
        var inTelegram = window.Telegram && Telegram.WebApp && Telegram.WebApp.initData;
        if (inTelegram) closeBtn.style.display = 'none';
        else { closeBtn.style.display = ''; closeBtn.addEventListener('click', function() { if (window.Telegram && Telegram.WebApp) Telegram.WebApp.close(); }); }
      }
    })();
  </script>
</body>
</html>
