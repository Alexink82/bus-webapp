<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <meta name="theme-color" content="#1a1a2e">
  <title>Профиль</title>
  <link rel="stylesheet" href="css/main.css">
  <link rel="stylesheet" href="css/telegram-theme.css">
  <link rel="stylesheet" href="css/animations.css">
  <script>
    (function(){
      var lang = localStorage.getItem('lang');
      if (lang === 'ru' || lang === 'en' || lang === 'be') document.documentElement.setAttribute('lang', lang);
      var t = localStorage.getItem('theme');
      if (t === 'light' || t === 'dark') document.documentElement.setAttribute('data-theme', t);
      if (localStorage.getItem('reduceMotion') === '1') document.documentElement.classList.add('reduce-motion');
    })();
  </script>
  <script src="https://telegram.org/js/telegram-web-app.js"></script>
</head>
<body>
  <div id="maintenanceOverlay" class="maintenance-overlay hidden">
    <div class="maintenance-overlay__inner">
      <img src="img/logo.png" alt="СТОЛИЦА" class="maintenance-overlay__logo" width="160" height="40">
      <h1>Технические работы</h1>
      <p>Приносим извинения за неудобства. Мы обновляем сервис.</p>
      <p>Примерное время возобновления: <span id="maintenanceUntil">—</span></p>
      <p class="maintenance-overlay__countdown" id="maintenanceCountdown">—</p>
    </div>
  </div>
  <div class="container" id="appContent">
    <header class="header">
      <div class="header__logo-bar">
        <img src="img/logo.png" alt="СТОЛИЦА" class="header__logo" width="160" height="40">
      </div>
      <div class="header__row">
        <button type="button" id="themeToggle" class="theme-toggle" aria-label="Сменить тему" title="Светлая/тёмная тема">☀️</button>
        <div class="header__title-wrap">
          <h1>Профиль</h1>
        </div>
        <button type="button" id="tgCloseBtn" class="tg-close-btn" aria-label="Закрыть" title="Закрыть">✕</button>
      </div>
    </header>
    <main class="main">
      <section id="settingsSection" class="settings-section">
        <h2 id="settingsTitle" data-i18n="settings">Настройки</h2>
        <div class="settings-group">
          <label for="langSelect" id="langLabel" data-i18n="language">Язык</label>
          <select id="langSelect" class="settings-select" aria-label="Язык">
            <option value="ru">Русский</option>
            <option value="en">English</option>
            <option value="be">Беларуская</option>
          </select>
        </div>
        <label class="settings-checkbox">
          <input type="checkbox" id="reduceMotionCheck" aria-describedby="reduceMotionHint">
          <span id="reduceMotionLabel" data-i18n="reduceAnimations">Уменьшить анимации</span>
        </label>
        <p id="reduceMotionHint" class="settings-hint" data-i18n="reduceAnimationsHint">Рекомендуется при чувствительности к движению на экране.</p>
      </section>
      <section id="bookingsSection">
        <h2 id="bookingsTitle" data-i18n="myBookings">Мои брони</h2>
        <div id="bookingsList"></div>
      </section>
      <section id="passengersSection">
        <h2 id="passengersTitle" data-i18n="savedPassengers">Сохранённые пассажиры</h2>
        <div id="passengersList"></div>
        <button type="button" id="addPassenger" class="btn btn-small" data-i18n="add">Добавить</button>
      </section>
    </main>
    <nav class="tab-bar" id="tabBar">
      <a href="index.html" class="tab">🎫 Бронь</a>
      <a href="profile.html" class="tab active">👤 Профиль</a>
      <a href="faq.html" class="tab">❓ FAQ</a>
    </nav>
  </div>
  <script src="js/maintenance.js"></script>
  <script src="js/api.js"></script>
  <script src="js/auth.js"></script>
  <script src="js/app-modal.js"></script>
  <script src="js/input-masks.js"></script>
  <script src="js/i18n.js"></script>
  <script src="js/settings.js"></script>
  <script src="js/theme.js"></script>
  <script src="js/nav.js"></script>
  <script src="js/prefetch.js"></script>
  <script src="js/consent.js"></script>
  <script src="js/profile.js"></script>
  <script>
    (function() {
      var closeBtn = document.getElementById('tgCloseBtn');
      if (closeBtn) {
        var inTelegram = window.Telegram && Telegram.WebApp && Telegram.WebApp.initData;
        if (inTelegram) closeBtn.style.display = 'none';
        else { closeBtn.style.display = ''; closeBtn.addEventListener('click', function() { if (window.Telegram && Telegram.WebApp) Telegram.WebApp.close(); }); }
      }
      var langSelect = document.getElementById('langSelect');
      var reduceCheck = document.getElementById('reduceMotionCheck');
      if (langSelect) {
        langSelect.value = typeof getLang === 'function' ? getLang() : 'ru';
        langSelect.addEventListener('change', function() {
          if (typeof setLang === 'function') setLang(this.value);
          if (typeof applyI18nToPage === 'function') applyI18nToPage();
        });
      }
      if (reduceCheck) {
        reduceCheck.checked = typeof getReduceMotion === 'function' ? getReduceMotion() : false;
        reduceCheck.addEventListener('change', function() {
          if (typeof setReduceMotion === 'function') setReduceMotion(this.checked);
        });
      }
      if (typeof applyI18nToPage === 'function') applyI18nToPage();
    })();
  </script>
</body>
</html>
