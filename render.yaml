services:
  - type: web
    name: bus-booking-webapp
    env: python
    buildCommand: cd backend && pip install -r requirements.txt
    startCommand: cd backend && uvicorn main:app --host 0.0.0.0 --port $PORT
    envVars:
      - key: DATABASE_URL
        fromDatabase:
          name: bus-booking-db
          property: connectionString
  - type: pserv
    name: bus-booking-db
    plan: free
