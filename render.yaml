# Bus Booking Webapp — deploy on Render
# https://render.com/docs/blueprint-spec

services:
  - type: web
    name: bus-booking-webapp
    env: docker
    dockerfilePath: Dockerfile
    dockerContext: .

    envVars:
      - key: BOT_TOKEN
        description: Telegram bot token from @BotFather
        sync: false
      - key: CHANNEL_ID
        description: Telegram channel (e.g. @channelname or -100...)
        sync: false
      - key: ADMIN_IDS
        description: Comma-separated admin Telegram IDs
        sync: false
      - key: DISPATCHER_IDS
        description: Comma-separated dispatcher Telegram IDs
        sync: false
      - key: DATABASE_URL
        description: PostgreSQL URL (create Postgres in Render Dashboard or use external)
        sync: false
      - key: WEBAPP_URL
        description: "Public HTTPS URL of this service (e.g. https://bus-booking-xxx.onrender.com). Required for Telegram Web App button and CORS. Set in Render Dashboard after first deploy."
        value: ""
      - key: BACKEND_URL
        description: Same as WEBAPP_URL or your custom domain (optional)
        value: ""
      - key: ALLOWED_ORIGINS
        description: "Comma-separated CORS origins (e.g. https://your-app.onrender.com). If empty, app uses WEBAPP_URL or *."
        value: ""
      - key: OPENWEATHER_API_KEY
        description: Optional; for scheduler/weather if used
        value: ""
      - key: WEBPAY_CALLBACK_SECRET
        description: Secret for WebPay callback (production)
        generateValue: true
      - key: DEBUG
        value: "false"
        sync: false
      - key: RATE_LIMIT
        value: "60"
        sync: false
      - key: BROWSER_LOGIN_TICKET_TTL_SECONDS
        description: "One-time Telegram -> browser ticket lifetime in seconds for admin/dispatcher backoffice"
        value: "60"
      - key: BROWSER_SESSION_TTL_HOURS
        description: "Browser session lifetime in hours for admin/dispatcher backoffice"
        value: "12"
      - key: BROWSER_SESSION_IDLE_REFRESH_MINUTES
        description: "How often active browser sessions are refreshed"
        value: "5"
      - key: BROWSER_SESSION_COOKIE_NAME
        description: "Cookie name for browser backoffice session"
        value: "bus_backoffice_session"
